<script>
  // ---> IMPORTANT: REPLACE THIS URL WITH YOUR GOOGLE APPS SCRIPT WEB APP URL <---
  const API_URL = "https://script.google.com/macros/s/AKfycbwc6UDaA4yZp6gU0HRlDCiyuDV3Gu74ZbvkH4-o5E5pvgEy1Zv8feCei58rju7_Q_15/exec"; 
  const GITHUB_VIEWER_URL = "https://egmqr.github.io/photo-viewer/viewer.html"; 

  // Dynamically grab the folderId from the web address
  const urlParams = new URLSearchParams(window.location.search);
  const targetFolderId = urlParams.get('folderId');

  window.filteredImages = []; 
  let allImages = [], currentIndex = 0, isFirstLoad = true, scrollObserver = null;
  let viewerWindow = null;
  
  const gridThumbSize = (window.innerWidth > 768) ? '=w300' : '=w150'; 

  window.onload = () => {
    if (!targetFolderId) {
      document.getElementById('gallery').innerHTML = "<h2 style='text-align:center; padding: 40px;'>Error: No folderId in URL</h2>";
      document.getElementById('background-loader').style.display = 'none';
      return;
    }

    // 1. Fetch initial fast batch
    fetch(`${API_URL}?api=getInitial&folderId=${targetFolderId}`)
      .then(res => res.json())
      .then(res => {
        if (res.data && isFirstLoad) loadData(res.data);
        handleDeepSync(); 
      })
      .catch(err => {
        console.error("Initial load failed:", err);
        document.getElementById('loader-msg').innerText = "Sync Failed";
      });
  };

  window.addEventListener('message', (event) => {
    if (event.data && event.data.type === 'VIEWER_READY') {
      if (viewerWindow && !viewerWindow.closed) {
        viewerWindow.postMessage({ type: 'INIT_DATA', images: window.filteredImages }, '*');
      }
    }
  });

  function handleImageClick(id) {
    viewerWindow = window.open(`${GITHUB_VIEWER_URL}?id=${id}`, "_blank");
  }

  // 2. Fetch deep sync data
  function handleDeepSync() {
    fetch(`${API_URL}?api=gallery&folderId=${targetFolderId}`)
      .then(res => res.json())
      .then(res => {
        document.getElementById('background-loader').style.display = 'none';
        if (!res.data) return;
        
        allImages = res.data.map(processItem);
        applyFilter(); 
        isFirstLoad = false; 
        showToast('Synced'); 
        setInterval(refreshData, 30000); 

        if (viewerWindow && !viewerWindow.closed) {
          viewerWindow.postMessage({ type: 'UPDATE_DATA', images: window.filteredImages }, '*');
        }
      })
      .catch(err => {
        console.error("Deep sync failed:", err);
        document.getElementById('background-loader').style.display = 'none';
      });
  }

  // Array parsing remains identical to your stable version
  function processItem(item) {
    const [id, name, rawUrl, rawTime] = item;
    let displayTime = '';
    if (rawTime > 0) {
      const d = new Date(rawTime);
      const ph = new Date(d.getTime() + (d.getTimezoneOffset() * 60000) + (8 * 3600000));
      let h = ph.getHours(), m = ph.getMinutes().toString().padStart(2, '0');
      displayTime = `${h % 12 || 12}:${m} ${h >= 12 ? 'PM' : 'AM'}`;
    }
    let baseUrl = rawUrl.startsWith('data:') ? rawUrl : rawUrl.split('=')[0];
    return { id, name, baseUrl, url: baseUrl + (rawUrl.startsWith('data:') ? '' : gridThumbSize), displayTime, searchStr: `${displayTime} ${name}`.toLowerCase() };
  }

  // Search input handlers
  function handleSearch() {
    const val = document.getElementById('timeSearch').value;
    document.getElementById('clearSearch').style.display = val.length > 0 ? 'flex' : 'none';
    applyFilter();
  }

  function clearSearch() {
    document.getElementById('timeSearch').value = '';
    document.getElementById('clearSearch').style.display = 'none';
    applyFilter();
  }

  function applyFilter() {
    const terms = document.getElementById('timeSearch').value.toLowerCase().trim().split(/\s+/).filter(Boolean);
    window.filteredImages = terms.length > 0 ? allImages.filter(img => terms.every(t => img.searchStr.includes(t))) : allImages;
    document.getElementById('gallery').innerHTML = ''; 
    const targetCount = Math.max(currentIndex, 24);
    currentIndex = 0;
    
    if (window.filteredImages.length === 0) {
      document.getElementById('gallery').innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 40px; font-weight:bold; color: rgba(0,0,0,0.5);">No photos found.</div>`;
    } else { 
      while(currentIndex < targetCount && currentIndex < window.filteredImages.length) { renderNextPage(); }
      setupInfiniteScroll(); 
    }
  }

  function renderNextPage() {
    if (currentIndex >= window.filteredImages.length) return;
    const frag = document.createDocumentFragment();
    window.filteredImages.slice(currentIndex, currentIndex + 24).forEach((img, i) => {
      const card = document.createElement('div'); card.className = 'card';
      card.innerHTML = `<div class="image-container" onclick="handleImageClick('${img.id}')"><img loading="${currentIndex === 0 && i < 12 ? 'eager' : 'lazy'}" src="${img.url}" onload="this.classList.add('loaded')"></div><div class="card-footer"><span class="time-value">${img.displayTime}</span></div>`;
      frag.appendChild(card);
    });
    document.getElementById('gallery').appendChild(frag); currentIndex += 24;
  }

  function setupInfiniteScroll() {
    if (scrollObserver) scrollObserver.disconnect();
    scrollObserver = new IntersectionObserver(e => { if(e[0].isIntersecting) renderNextPage(); }, {rootMargin: '400px'});
    scrollObserver.observe(document.getElementById('sentinel'));
  }

  function showToast(m) { const t = document.getElementById('status-toast'); t.innerText = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 3000); }
  function loadData(d) { allImages = d.map(processItem); applyFilter(); }
  
  // 3. Interval background check
  function refreshData() { 
    fetch(`${API_URL}?api=gallery&folderId=${targetFolderId}`)
      .then(res => res.json())
      .then(res => {
        if (!res.data) return;
        const fresh = res.data.map(processItem); 
        let hasChanges = (fresh.length !== allImages.length);
        if (!hasChanges) { for (let i = 0; i < Math.min(fresh.length, 50); i++) { if (fresh[i].id !== allImages[i].id) { hasChanges = true; break; } } }
        
        if (hasChanges) { 
          allImages = fresh; 
          applyFilter(); 
          showToast('Updated'); 
          if (viewerWindow && !viewerWindow.closed) {
            viewerWindow.postMessage({ type: 'UPDATE_DATA', images: window.filteredImages }, '*');
          }
        } 
      })
      .catch(err => console.error("Background sync failed:", err));
  }
</script>
</body>
</html>
