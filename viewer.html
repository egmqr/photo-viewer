<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Photo Viewer</title>
  <style>
    body { margin:0; background:#000; height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow:hidden; } 
    .popout-close { position: absolute; top: max(40px, env(safe-area-inset-top)); right: max(20px, env(safe-area-inset-right)); width: 44px; height: 44px; background: rgba(255,255,255,0.25); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 99999; color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.4); } 
    .image-stage { position: absolute; top: calc(max(40px, env(safe-area-inset-top)) + 60px); bottom: calc(160px + env(safe-area-inset-bottom)); left: 0; right: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; } 
    img.main { width: 100%; height: 100%; transition: opacity 0.2s ease; opacity:0; object-fit: contain; pointer-events: auto; user-select: none; -webkit-user-drag: none; } 
    .hint-banner { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: fit-content; max-width: 90%; font-size: 13px; text-align: center; font-weight: bold; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px; z-index: 100; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.3); transition: opacity 0.3s; pointer-events: none; opacity: 0; }
    .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 10; color: #fff; cursor:pointer;} 
    .left { left: max(10px, env(safe-area-inset-left)); } .right { right: max(10px, env(safe-area-inset-right)); } 
    .modal-bottom-controls { position: absolute; bottom: 0; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 20; padding-top: 20px; padding-bottom: max(20px, env(safe-area-inset-bottom)); background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); } 
    .filmstrip-wrapper { position: relative; width: 100%; overflow-x: auto; white-space: nowrap; -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); padding: 10px calc(50% - 26.5px); box-sizing: border-box; } 
    .filmstrip-wrapper::-webkit-scrollbar { display: none; } 
    .filmstrip-thumb { cursor: pointer; box-sizing: border-box; width: 45px; height: 45px; object-fit: cover; display: inline-block; margin: 0 4px; border-radius: 6px; opacity: 0.4; border: 2px solid transparent; transition: all 0.2s; background-color: #222; } 
    .filmstrip-thumb.active { opacity: 1; transform: scale(1.2); border-color: white; box-shadow: 0 0 12px rgba(255,255,255,0.9); z-index: 2; position: relative; } 
    .scrubber-track { width: 90%; max-width: 500px; height: 50px; display: flex; align-items: center; position: relative; touch-action: none; cursor: pointer;} 
    .track-line { width: 100%; height: 4px; background: #444; border-radius: 2px; } 
    .scrubber-handle { width: 24px; height: 24px; background: #fff; border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); box-shadow: 0 2px 8px rgba(0,0,0,0.6); pointer-events: none; } 
    .time-bubble { position: absolute; top: -30px; transform: translateX(-50%); background: #333; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  </style>
</head>
<body>
  <div class="popout-close" onclick="window.close()">✕</div>
  <div class="image-stage">
    <div id="hd-hint" class="hint-banner"></div>
    <div class="nav-btn left" onclick="navigate(-1)">&#10094;</div>
    <img id="main-image" class="main" src="">
    <div class="nav-btn right" onclick="navigate(1)">&#10095;</div>
  </div>
  <div class="modal-bottom-controls">
    <div id="image-counter" style="font-size:12px; color:#aaa; font-weight:bold;">...</div>
    <div class="filmstrip-wrapper" id="filmstripWrapper"></div>
    <div class="scrubber-track" id="scrubberTrack">
      <div class="time-bubble" id="timeBubble"></div>
      <div class="track-line"></div>
      <div class="scrubber-handle" id="scrubberHandle"></div>
    </div>
  </div>

  <script>
    let images = [];
    let currentIndex = 0;
    
    // State & Timers
    let activeHdLoader = null, idleHdTimer = null, fadeTimer = null, hintTimer = null;
    let isScrubbing = false, pIsProgrammatic = false, scrollEndTimer = null;
    let lastPreviewFetch = 0, popoutImgTimer = null, scrubRAF = null;

    // 1. Handshake: Tell parent window we are ready
    window.onload = () => {
      if (window.opener) window.opener.postMessage({ type: 'VIEWER_READY' }, '*');
    };

    // 2. Listen for Data from Parent
    window.addEventListener('message', (event) => {
      if (!event.data) return;

      if (event.data.type === 'INIT_DATA') {
        images = event.data.images;
        // Parse the requested ID from the URL (e.g. viewer.html?id=123)
        const targetId = new URLSearchParams(window.location.search).get('id');
        currentIndex = Math.max(0, images.findIndex(img => img.id === targetId));
        
        rebuildFilmstrip(true);
        updateUI(false, true);
      } 
      else if (event.data.type === 'UPDATE_DATA') {
        // Deep fetch finished! Update array silently
        images = event.data.images;
        rebuildFilmstrip(false); // False prevents scrolling the wrapper unnecessarily
        updateUI(false, false);
      }
    });

    // 3. UI Rebuild Logic
    function rebuildFilmstrip(forceScroll) {
      const wrapper = document.getElementById('filmstripWrapper');
      const currentScroll = wrapper.scrollLeft; // Save exact scroll position
      
      let fHtml = '';
      images.forEach((f, i) => { fHtml += `<img id="pt-${i}" class="filmstrip-thumb ${i === currentIndex ? 'active' : ''}" src="${f.baseUrl.startsWith('data:') ? f.baseUrl : f.baseUrl + '=s50-c'}" loading="lazy" onclick="navigateTo(${i})">`; });
      wrapper.innerHTML = fHtml;
      
      if (forceScroll) {
        const nA = document.getElementById('pt-' + currentIndex); 
        if(nA) { 
          wrapper.style.scrollBehavior = 'auto'; 
          wrapper.scrollLeft = nA.offsetLeft + (nA.offsetWidth / 2) - (wrapper.offsetWidth / 2); 
        }
      } else {
        wrapper.scrollLeft = currentScroll; // Restore scroll seamlessly
      }
    }

    function showHint(msg, persist = false) {
      const h = document.getElementById('hd-hint');
      h.innerText = msg; h.style.opacity = '1';
      clearTimeout(hintTimer);
      if (!persist) {
        hintTimer = setTimeout(() => { 
          h.style.opacity = '0'; 
          setTimeout(() => { if(h.style.opacity === '0') h.innerText = ''; }, 300);
        }, 5000);
      }
    }

    function updateUI(scrub = false, updateScroll = true) {
      if (!images || images.length === 0) return;
      const imgData = images[currentIndex];
      const pct = images.length > 1 ? (currentIndex / (images.length - 1)) * 100 : 0;
      
      document.getElementById('scrubberHandle').style.left = pct + '%'; 
      document.getElementById('timeBubble').style.left = pct + '%'; 
      document.getElementById('timeBubble').innerText = imgData.displayTime; 
      document.getElementById('image-counter').innerText = `${currentIndex + 1} / ${images.length}`; 

      document.querySelectorAll('.filmstrip-thumb.active').forEach(el => el.classList.remove('active')); 
      const activeThumb = document.getElementById('pt-' + currentIndex); 
      const wrapper = document.getElementById('filmstripWrapper');
      
      if (activeThumb) { 
        activeThumb.classList.add('active'); 
        if (updateScroll) { 
          pIsProgrammatic = true; 
          wrapper.style.scrollBehavior = 'auto'; 
          wrapper.scrollLeft = activeThumb.offsetLeft + (activeThumb.offsetWidth / 2) - (wrapper.offsetWidth / 2);
          setTimeout(() => { pIsProgrammatic = false; }, 150); 
        } 
      }

      // Clear Timers & Loaders
      clearTimeout(idleHdTimer); clearTimeout(fadeTimer); clearTimeout(hintTimer);
      document.getElementById('hd-hint').style.opacity = '0';
      if (activeHdLoader) { activeHdLoader.onload = null; activeHdLoader.onerror = null; activeHdLoader.src = ""; activeHdLoader = null; }
      
      const imgEl = document.getElementById('main-image');
      imgEl.onload = null;

      let previewUrl = imgData.baseUrl.startsWith('data:') ? imgData.baseUrl : imgData.baseUrl + '=w400';
      let scrubUrl = imgData.baseUrl.startsWith('data:') ? imgData.baseUrl : imgData.baseUrl + '=w200';

      if (scrub) { 
        const now = Date.now(); 
        if (now - lastPreviewFetch > 120) { imgEl.src = scrubUrl; lastPreviewFetch = now; } 
        else { clearTimeout(popoutImgTimer); popoutImgTimer = setTimeout(() => { imgEl.src = scrubUrl; lastPreviewFetch = Date.now(); }, 120); }
      } else { 
        imgEl.style.opacity = 0; 
        const renderIndex = currentIndex; // Trap index
        
        fadeTimer = setTimeout(() => { 
          imgEl.src = previewUrl; 
          imgEl.onload = () => {
            imgEl.onload = null; 
            if (currentIndex !== renderIndex) return;
            imgEl.style.opacity = 1; 
            
            idleHdTimer = setTimeout(() => {
              if (currentIndex !== renderIndex) return;
              const isData = previewUrl.startsWith('data:');
              const hdUrl = isData ? previewUrl : imgData.baseUrl + '=s0';
              if (!isData) showHint("Loading HD photo...", true);
              
              activeHdLoader = new Image();
              activeHdLoader.onload = () => { 
                activeHdLoader.onload = null;
                if (currentIndex !== renderIndex) return;
                imgEl.src = hdUrl; 
                if (!isData) showHint("HD photo loaded. Long press the image then Save to Photos");
              };
              activeHdLoader.onerror = () => { if (!isData) showHint("Failed to load HD photo", false); };
              activeHdLoader.src = hdUrl;
            }, 800);
          };
        }, 20); 
      } 
    }

    // 4. Interactions
    window.navigateTo = (idx) => { currentIndex = idx; updateUI(false, true); };
    window.navigate = (dir) => { const n = currentIndex + dir; if (n >= 0 && n < images.length) navigateTo(n); };

    // Keyboard
    window.addEventListener('keydown', (e) => { if (e.key === 'ArrowRight') navigate(1); else if (e.key === 'ArrowLeft') navigate(-1); else if (e.key === 'Escape') window.close(); });

    // Swipe
    let pStartX = 0, pEndX = 0;
    const stage = document.querySelector('.image-stage');
    stage.addEventListener('touchstart', e => { pStartX = e.changedTouches[0].screenX; }, {passive: true});
    stage.addEventListener('touchend', e => { pEndX = e.changedTouches[0].screenX; if (pStartX - pEndX > 50) navigate(1); if (pEndX - pStartX > 50) navigate(-1); }, {passive: true});

    // Scrubber
    const track = document.getElementById('scrubberTrack');
    const hS = (cX) => { 
      if(scrubRAF) cancelAnimationFrame(scrubRAF); 
      scrubRAF = requestAnimationFrame(() => {
        const rect = track.getBoundingClientRect(); 
        const pct = Math.max(0, Math.min(cX - rect.left, rect.width)) / rect.width;
        const n = Math.round(pct * (images.length - 1));
        if (n !== currentIndex) { currentIndex = n; updateUI(true, true); }
      }); 
    };
    track.addEventListener('touchstart', e => { isScrubbing = true; document.getElementById('timeBubble').style.opacity = 1; hS(e.touches[0].clientX); }, {passive: false}); 
    window.addEventListener('touchmove', e => { if (isScrubbing) { e.preventDefault(); hS(e.touches[0].clientX); } }, {passive: false}); 
    window.addEventListener('touchend', () => { if (isScrubbing) { isScrubbing = false; document.getElementById('timeBubble').style.opacity = 0; updateUI(false, true); } }); 

    // Filmstrip scroll syncing
    const wrapper = document.getElementById('filmstripWrapper');
    wrapper.addEventListener('scroll', () => { 
      if (isScrubbing || pIsProgrammatic) return; 
      const centerIdx = Math.max(0, Math.min(images.length - 1, Math.round(wrapper.scrollLeft / 53)));
      if (centerIdx !== currentIndex) { currentIndex = centerIdx; updateUI(true, false); }
      clearTimeout(scrollEndTimer); 
      scrollEndTimer = setTimeout(() => { updateUI(false, false); }, 150);
    }); 
  </script>
</body>
</html>
