<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
    
    <style>
    /* 1. LAYOUT RESET */
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: Montserrat, Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
        background-color: #000; 
    }

    /* 2. HEADER SECTION */
    .header-wrapper {
        flex: 0 0 auto;
        background-color: rgba(0, 0, 0, 0.4); 
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        z-index: 10;
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
    }

    h1.page-title {
        margin: 0;
        padding: 15px 0 5px 0;
        text-align: center;
        font-size: 22px;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
    }

    .nav-container {
        display: flex;
        justify-content: flex-start;
        width: 100%;
        overflow-x: auto; 
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch; 
        scrollbar-width: none; 
        padding-bottom: 2px; 
    }

    .nav-container::-webkit-scrollbar {
        display: none;
    }

    .nav-tab {
        flex: 0 0 auto; 
        padding: 12px 20px;
        border: none;
        background: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.5);
        border-bottom: 4px solid transparent;
        transition: all 0.3s ease;
        text-shadow: 1px 1px 4px rgba(0, 0, 0, 1);
        white-space: nowrap; 
    }

    .nav-tab.active {
        color: #fff;
        border-bottom: 4px solid #fff;
        text-shadow: 1px 1px 4px rgba(0,0,0,1);
    }

    /* 3. IFRAME AREA & SPINNER */
    .iframe-container {
        flex: 1;
        position: relative;
    }

    /* Global loading spinner that sits securely behind the iframes */
    .global-loader {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 1;
    }
    
    .spinner {
        width: 30px;
        height: 30px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top: 3px solid #ffd966;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .loader-text {
        color: #fff;
        font-size: 12px;
        font-weight: bold;
        text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
    }

    .app-iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.4s ease, visibility 0.4s;
        z-index: 2; /* Sits above the loader */
        background: transparent;
    }

    .app-iframe.active {
        opacity: 1;
        visibility: visible;
    }

    /* 4. MOBILE SPECIFIC */
    @media (max-width: 600px) {
        h1.page-title { font-size: 18px; }
        .nav-tab { padding: 10px 15px; font-size: 12px; }
    }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <h1 class="page-title" id="event-title">Loading...</h1>
        <div class="nav-container" id="nav-container">
            </div>
    </div>

    <div class="iframe-container" id="iframe-container">
        
        <div class="global-loader" id="main-loader">
            <div class="spinner"></div>
            <div class="loader-text" id="loader-msg">Loading Gallery...</div>
        </div>

        </div>

    <script>
    // --- GLOBAL LOADER FUNCTIONS ---
    function hideLoader() {
        const activeFrame = document.querySelector('.app-iframe.active');
        if (activeFrame && activeFrame.getAttribute('src')) {
            document.getElementById('main-loader').style.display = 'none';
        }
    }

    function showLoader() {
        document.getElementById('main-loader').style.display = 'flex';
    }

    // --- DYNAMIC CONTENT GENERATION ---
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Parse URL Parameters
        const params = new URLSearchParams(window.location.search);

        const eventName = params.get('eventName') || 'Default Event Name';
        const bgId = params.get('bgId') || '1-0RbQzhgbnTk98YwwfNYTyTKeoO68GB9';
        const boothsParam = params.get('booths'); 
        
        let requestedTab = parseInt(params.get('tab'), 10);
        if (isNaN(requestedTab) || requestedTab < 1) {
            requestedTab = 1;
        }

        // 2. Apply Event Name and Background
        document.getElementById('event-title').innerText = eventName;
        document.body.style.backgroundImage = `url('https://drive.google.com/thumbnail?id=${bgId}&sz=w1000')`;

        // 3. Setup Booths based on the 'booths' parameter (split by | character)
        let boothLinks = [];
        if (boothsParam) {
            boothLinks = boothsParam.split('|').filter(link => link.trim() !== '');
        } else {
            boothLinks = [
                'https://egmqr.github.io/photo-viewer/index.html?folderId=13fAzmvuXHgOfN6FVXfu7Mbk6Sb0_xXVo&booth=1',
                'https://egmqr.github.io/photo-viewer/index.html?folderId=1vcSQbJIr945g71SinfzNYxs7AmMV7V-9&booth=2'
            ];
        }

        if (requestedTab > boothLinks.length) {
            requestedTab = 1;
        }
        
        const activeIndex = requestedTab - 1; 

        const navContainer = document.getElementById('nav-container');
        const iframeContainer = document.getElementById('iframe-container');

        // Hide the tab bar entirely if there is only 1 booth
        if (boothLinks.length <= 1) {
            navContainer.style.display = 'none';
        }

        // Build the DOM elements dynamically
        boothLinks.forEach((link, index) => {
            const boothNum = index + 1;
            const frameId = `frame-${boothNum}`;
            const isTargetActive = (index === activeIndex); 

            // Create Tab Button (Only if there are multiple booths)
            if (boothLinks.length > 1) {
                const btn = document.createElement('button');
                btn.className = `nav-tab ${isTargetActive ? 'active' : ''}`;
                btn.setAttribute('data-target', frameId);
                btn.innerText = `Photobooth ${boothNum}`;
                navContainer.appendChild(btn);
            }

            // Create Iframe
            const iframe = document.createElement('iframe');
            iframe.id = frameId;
            iframe.className = `app-iframe ${isTargetActive ? 'active' : ''}`;
            
            if (isTargetActive) {
                iframe.src = link;
            } else {
                iframe.setAttribute('data-src', link);
            }
            
            iframe.onload = hideLoader;
            iframeContainer.appendChild(iframe);
        });

        // Scroll the active tab into view if there are tabs
        if (boothLinks.length > 1) {
            setTimeout(() => {
                const activeTabBtn = document.querySelector('.nav-tab.active');
                if (activeTabBtn) {
                    activeTabBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }, 100);
        }

        // 4. Initialize Interactivity (Tabs and Lazy Loading)
        setupInteractivity();
    });

    // --- TAB SWITCHING & PRE-FETCHING LOGIC ---
    function setupInteractivity() {
        const tabs = document.querySelectorAll('.nav-tab');
        const frames = document.querySelectorAll('.app-iframe');

        const scrollToActiveTab = (tab) => {
            tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        };

        // Background Pre-fetching
        setTimeout(() => {
            let delay = 0;
            frames.forEach(frame => {
                const dataSrc = frame.getAttribute('data-src');
                if (dataSrc) {
                    setTimeout(() => { frame.setAttribute('src', dataSrc); }, delay);
                    delay += 1500; 
                }
            });
        }, 2500);

        // Tab click event listeners (will only apply if tabs exist)
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                frames.forEach(f => f.classList.remove('active'));

                tab.classList.add('active');
                scrollToActiveTab(tab);

                const targetId = tab.getAttribute('data-target');
                const targetFrame = document.getElementById(targetId);

                if (targetFrame) {
                    const dataSrc = targetFrame.getAttribute('data-src');
                    const currentSrc = targetFrame.getAttribute('src');

                    if (dataSrc && !currentSrc) {
                        showLoader();
                        targetFrame.setAttribute('src', dataSrc);
                    } else {
                        hideLoader(); 
                    }
                    
                    targetFrame.classList.add('active');
                    
                    const newTabNum = targetId.replace('frame-', '');
                    const newUrl = new URL(window.location);
                    newUrl.searchParams.set('tab', newTabNum);
                    window.history.replaceState({}, '', newUrl);
                }
            });
        });
    }
    </script>
</body>
</html>
